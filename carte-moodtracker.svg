<svg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' width='1020' height='567'>
  <defs>
    <linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#FFD07A'/>
      <stop offset='55%' stop-color='#FF8C5A'/>
      <stop offset='100%' stop-color='#FF6B5A'/>
    </linearGradient>
    <clipPath id='card'>
      <rect width='1020' height='567' rx='60' ry='60'/>
    </clipPath>
  </defs>
  <rect width='1020' height='567' rx='60' ry='60' fill='url(#g)'/>
  <g clip-path='url(#card)'>
    <circle cx='850' cy='-60' r='280' fill='rgba(255,255,255,0.10)'/>
    <circle cx='920' cy='100' r='180' fill='rgba(255,255,255,0.07)'/>
    <circle cx='80' cy='540' r='200' fill='rgba(255,255,255,0.07)'/>
  </g>
  <!-- Emoji -->
  <text x='80' y='230' font-size='110' font-family='Segoe UI Emoji,Apple Color Emoji,sans-serif'>🩷</text>
