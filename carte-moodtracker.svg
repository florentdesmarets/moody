  <text x='210' y='190' font-size='90' font-weight='800' fill='white' font-family='Segoe UI,system-ui,sans-serif' letter-spacing='-2'>MoodTracker</text>
  <!-- Tagline -->
  <text x='213' y='240' font-size='32' fill='rgba(255,255,255,0.85)' font-family='Segoe UI,system-ui,sans-serif'>Suivi émotionnel quotidien · Gratuit · PWA</text>
  <!-- URL -->
  <text x='80' y='490' font-size='30' font-weight='600' fill='rgba(255,255,255,0.90)' font-family='Segoe UI,system-ui,sans-serif'>florentdesmarets.github.io/moodtracker</text>
  <!-- QR fond blanc -->
